<script type="text/javascript">
	function Comprobar(){
		var doc = $("#doc").val();
		alertify.notify("El cliente "+doc+" no se encuentra registrado en el sistema");
		$("#doc").val("");
		$("#docN").val(doc);
		$("#campos").css("display", "block");
	}

	function RegistrarCliente(){
		$("#frmCliente").css("display", "none");
		alertify.success("Cliente registrado con exito");
	}

	
</script>
